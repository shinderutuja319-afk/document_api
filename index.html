<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document Analysis API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
     .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 400px;
    }
    h2 {
      text-align: center;
    
    }
    input, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #4CAF50;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    pre {
      background: #eee;
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      max-height: 200px;
      overflow: auto;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Document Analyzer</h2>

  <input type="file" id="fileInput" />
  <button onclick="uploadFile()">Analyze</button>

  <pre id="output">Result will appear here...</pre>
</div>


</body>
<script>
async function uploadFile() {
  console.log("Button clicked");

  const file = document.getElementById('fileInput').files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function () {
    try {
      console.log("File loaded");

      const base64 = reader.result.split(',')[1];

      console.log("Sending request...");

      const response = await fetch("https://document-api-oldp.onrender.com/api/document-analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": "sk_track2_987654321"
        },
        body: JSON.stringify({
          fileName: file.name,
          fileType: file.name.split('.').pop(),
          fileBase64: base64
        })
      });

      console.log("Response received");

      const data = await response.json();

      console.log("Data:", data);

      document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);

    } catch (error) {
      console.error("Error:", error);
      document.getElementById("output").textContent =
        "Error: " + error;
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</script>
</html>
